services:
  postgres:
    image: postgres:16-alpine
    container_name: vibetrip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vibetrip
      POSTGRES_USER: vibetrip
      POSTGRES_PASSWORD: vibetrip
    ports:
      - "5432:5432"
    volumes:
      - vibetrip-postgres-data:/var/lib/postgresql/data

volumes:
  vibetrip-postgres-data:
